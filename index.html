<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Runner - Mobile Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050810;
    color: #e8f4ff;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    touch-action: none;
    position: relative;
    height: 100vh;
    width: 100vw;
  }

  @media (max-width: 768px) {
    body { font-size: 14px; }
  }

  #gameContainer {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(180deg, #060820 0%, #0d1535 60%, #1a1040 100%);
  }

  .stars {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .skyline {
    position: absolute;
    bottom: 110px;
    left: 0; right: 0;
    height: 80px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    padding: 0 8px;
    animation: scroll-bg 8s linear infinite;
  }
  .building {
    background: rgba(0,245,255,0.06);
    border: 1px solid rgba(0,245,255,0.12);
    border-bottom: none;
    flex-shrink: 0;
  }
  @keyframes scroll-bg {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .ground {
    position: absolute;
    bottom: 80px;
    left: 0; right: 0;
    height: 30px;
    background: linear-gradient(180deg, #0d1f3c, #071020);
    border-top: 2px solid #00f5ff;
    box-shadow: 0 -4px 20px rgba(0,245,255,0.3);
    overflow: hidden;
  }
  .ground-line {
    position: absolute;
    top: 50%; left: 0;
    height: 1px;
    width: 40px;
    background: rgba(0,245,255,0.3);
    animation: ground-scroll 0.4s linear infinite;
  }
  @keyframes ground-scroll {
    from { transform: translateX(100vw); }
    to { transform: translateX(-40px); }
  }

  .player {
    position: absolute;
    bottom: 110px;
    left: 40px;
    width: 30px;
    height: 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
  }
  .player-body {
    width: 22px; height: 24px;
    background: linear-gradient(135deg, #00f5ff, #0099cc);
    border-radius: 4px 4px 2px 2px;
    box-shadow: 0 0 10px rgba(0,245,255,0.6);
    position: relative;
  }
  .player-body::before {
    content: '▶';
    position: absolute;
    top: 3px; left: 5px;
    font-size: 10px;
    color: rgba(0,0,0,0.5);
  }
  .player-legs {
    display: flex;
    gap: 4px;
    margin-top: 2px;
  }
  .leg {
    width: 7px; height: 12px;
    background: #00f5ff;
    border-radius: 2px;
    box-shadow: 0 0 6px rgba(0,245,255,0.5);
  }
  .leg:first-child { animation: leg1 0.3s steps(2) infinite; }
  .leg:last-child { animation: leg2 0.3s steps(2) infinite; }
  @keyframes leg1 { 0%,100%{ height:12px; } 50%{ height:6px; margin-top:6px; } }
  @keyframes leg2 { 0%,100%{ height:6px; margin-top:6px; } 50%{ height:12px; } }

  .obstacle {
    position: absolute;
    bottom: 110px;
    width: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 5;
  }
  .obs-body {
    background: linear-gradient(135deg, #ff3cac, #8800cc);
    border-radius: 3px 3px 0 0;
    box-shadow: 0 0 12px rgba(255,60,172,0.6);
  }

  .coin {
    position: absolute;
    width: 12px; height: 12px;
    background: #ffd700;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,215,0,0.7);
    z-index: 5;
  }

  .speed-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,245,255,0.2), transparent);
    animation: speed 0.6s linear infinite;
  }
  @keyframes speed {
    from { transform: translateX(100vw) scaleX(1); opacity: 1; }
    to { transform: translateX(-200px) scaleX(0.3); opacity: 0; }
  }

  .hud {
    position: absolute;
    top: 12px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 14px;
    z-index: 20;
    pointer-events: none; /* HUD doesn't need touch */
  }
  .hud-score {
    font-family: monospace;
    font-size: 13px;
    color: #00f5ff;
    text-shadow: 0 0 8px rgba(0,245,255,0.6);
  }
  .hud-score span { font-size: 9px; color: #5a6a8a; display: block; }
  .hud-lives { display: flex; gap: 3px; }
  .heart { font-size: 10px; filter: drop-shadow(0 0 4px rgba(255,60,172,0.8)); }
  .hud-best {
    font-family: monospace;
    font-size: 9px;
    color: #ffd700;
    text-align: right;
    text-shadow: 0 0 6px rgba(255,215,0,0.5);
  }
  .hud-best span { font-size: 12px; display: block; }

  /* =============================================
     FIX: Menu overlays need high z-index, 
     pointer-events: all, and no touch-action block
     ============================================= */
  .game-menu, .game-over {
    position: absolute;
    inset: 0;
    background: rgba(5,8,16,0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100; /* high enough to be above everything */
    text-align: center;
    pointer-events: all;
    touch-action: auto; /* allow normal touch on menus */
  }

  .game-title {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #00f5ff, #ff3cac);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* =============================================
     FIX: Buttons need explicit large touch target,
     pointer-events: all, and no inherited touch-action block
     ============================================= */
  .game-btn {
    background: rgba(0,245,255,0.1);
    border: 2px solid #00f5ff;
    color: #00f5ff;
    padding: 16px 32px;       /* larger tap area */
    font-size: 18px;
    margin: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
    pointer-events: all;
    touch-action: manipulation; /* FIX: tells browser this is a tap target */
    -webkit-tap-highlight-color: rgba(0,245,255,0.2);
    position: relative;
    z-index: 101;
    min-width: 160px;
    min-height: 52px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .game-btn:active {
    background: rgba(0,245,255,0.3);
    box-shadow: 0 0 20px rgba(0,245,255,0.5);
  }

  .hidden { display: none !important; }

  .jump-hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 8px;
    color: #00f5ff;
    letter-spacing: 2px;
    opacity: 0.6;
    animation: pulse-hint 1.5s ease-in-out infinite;
    z-index: 15;
    pointer-events: none;
  }
  @keyframes pulse-hint { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

  /* Dedicated invisible jump tap zone — covers the whole game area
     during gameplay, sits below menus (z-index 100) but above everything else */
  #tapOverlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    background: transparent;
    display: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  #tapOverlay.active {
    display: block;
  }

  @media (max-width: 480px) {
    .player { left: 20px; }
    .hud { padding: 0 10px; }
    .hud-score, .hud-best { font-size: 11px; }
    .jump-hint { font-size: 7px; }
  }
</style>
</head>
<body>

<div id="gameContainer">
  <div class="stars" id="stars"></div>

  <div class="speed-line" style="top:40px;width:80px;animation-delay:0s"></div>
  <div class="speed-line" style="top:60px;width:50px;animation-delay:0.2s"></div>
  <div class="speed-line" style="top:75px;width:100px;animation-delay:0.5s"></div>
  <div class="speed-line" style="top:90px;width:60px;animation-delay:0.8s"></div>

  <div class="hud">
    <div class="hud-score">
      <span>SCORE</span>
      <span id="scoreDisplay">00000</span>
    </div>
    <div class="hud-lives" id="livesDisplay">
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
    </div>
    <div class="hud-best">
      <span>BEST</span>
      <span id="bestDisplay">00000</span>
    </div>
  </div>

  <div class="skyline" id="skyline"></div>

  <div class="ground">
    <div class="ground-line" style="animation-delay:0s"></div>
    <div class="ground-line" style="animation-delay:0.13s"></div>
    <div class="ground-line" style="animation-delay:0.26s"></div>
    <div class="ground-line" style="animation-delay:0.39s"></div>
  </div>

  <div id="gameElements"></div>

  <!-- Dedicated jump tap zone — only active during gameplay -->
  <div id="tapOverlay"></div>

  <div class="jump-hint" id="jumpHint">▲ TAP TO JUMP ▲</div>

  <!-- Main Menu -->
  <div class="game-menu" id="mainMenu">
    <div class="game-title">NEON RUNNER</div>
    <button class="game-btn" id="playBtn">PLAY</button>
    <div style="margin-top: 20px; color: #5a6a8a; font-size: 12px;">
      High Score: <span id="menuHighScore">00000</span>
    </div>
  </div>

  <!-- Game Over -->
  <div class="game-over hidden" id="gameOver">
    <div class="game-title">GAME OVER</div>
    <div style="margin: 20px 0;">
      <div style="font-size: 18px; margin-bottom: 10px;">Score: <span id="finalScore">00000</span></div>
      <div style="font-size: 14px; color: #ffd700;">Best: <span id="finalBest">00000</span></div>
    </div>
    <button class="game-btn" id="retryBtn">RETRY</button>
    <button class="game-btn" id="menuBtn">MENU</button>
  </div>
</div>

<script>
// =============================================
// FIX: Wire buttons via JS addEventListener
// using 'touchend' + 'click' fallback.
// Do NOT use inline onclick="" — WebViewer
// sometimes blocks inline handlers.
// =============================================
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('playBtn').addEventListener('touchend', function(e) {
    e.preventDefault();
    e.stopPropagation();
    startGame();
  });
  document.getElementById('playBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    startGame();
  });

  document.getElementById('retryBtn').addEventListener('touchend', function(e) {
    e.preventDefault();
    e.stopPropagation();
    restartGame();
  });
  document.getElementById('retryBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    restartGame();
  });

  document.getElementById('menuBtn').addEventListener('touchend', function(e) {
    e.preventDefault();
    e.stopPropagation();
    showMenu();
  });
  document.getElementById('menuBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    showMenu();
  });
});

// Game variables
let gameState = 'menu';
let score = 0;
let lives = 3;
let highScore = 0;
let gameSpeed = 5;
let isJumping = false;
let jumpVelocity = 0;
let gravity = 0.8;
let groundY = 110;
let playerY = groundY;
let obstacles = [];
let coins = [];
let gameLoop = null;
let lastTime = 0;

// Safe localStorage access (WebViewer may block it)
try {
  highScore = parseInt(localStorage.getItem('neonRunnerHighScore')) || 0;
} catch(e) {
  highScore = 0;
}

let screenWidth = window.innerWidth;
let screenHeight = window.innerHeight;

function init() {
  generateStars();
  generateSkyline();
  updateHighScore();

  // =============================================
  // FIX: Use a dedicated tap overlay div for jumps.
  // This is the most reliable approach in WebViewer —
  // the overlay is the ONLY thing listening for jumps,
  // so there's zero chance of interfering with buttons.
  // =============================================
  var tapOverlay = document.getElementById('tapOverlay');

  tapOverlay.addEventListener('touchstart', function(e) {
    e.preventDefault();
    jump();
  }, { passive: false });

  tapOverlay.addEventListener('touchend', function(e) {
    e.preventDefault();
  }, { passive: false });

  // Mouse click fallback for desktop testing
  tapOverlay.addEventListener('click', function(e) {
    jump();
  });

  window.addEventListener('resize', function() {
    screenWidth = window.innerWidth;
    screenHeight = window.innerHeight;
  });
}

function generateStars() {
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.classList.add('star');
    const size = Math.random() * 2 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random() * 55}%;
      left:${Math.random() * 100}%;
      animation-delay:${Math.random() * 3}s;
      animation-duration:${1.5 + Math.random() * 2}s;
    `;
    starsEl.appendChild(s);
  }
}

function generateSkyline() {
  const skyline = document.getElementById('skyline');
  const bldgs = [20,35,15,45,28,18,40,25,32,16,42,22,38,14,30];
  [...bldgs,...bldgs].forEach(function(h) {
    const b = document.createElement('div');
    b.classList.add('building');
    const w = 10 + Math.random() * 14;
    b.style.cssText = `width:${w}px;height:${h}px;`;
    skyline.appendChild(b);
  });
}

function createPlayer() {
  const player = document.createElement('div');
  player.className = 'player';
  player.id = 'player';
  player.innerHTML = `
    <div class="player-body"></div>
    <div class="player-legs">
      <div class="leg"></div>
      <div class="leg"></div>
    </div>
  `;
  player.style.bottom = playerY + 'px';
  document.getElementById('gameElements').appendChild(player);
  return player;
}

function createObstacle(x, height) {
  const obstacle = document.createElement('div');
  obstacle.className = 'obstacle';
  obstacle.style.right = x + 'px';
  obstacle.innerHTML = `<div class="obs-body" style="width:22px;height:${height}px"></div>`;
  document.getElementById('gameElements').appendChild(obstacle);
  return {
    element: obstacle,
    x: screenWidth + x,
    height: height,
    speed: gameSpeed
  };
}

function createCoin(x, y) {
  const coin = document.createElement('div');
  coin.className = 'coin';
  coin.style.right = x + 'px';
  coin.style.bottom = y + 'px';
  document.getElementById('gameElements').appendChild(coin);
  return {
    element: coin,
    x: screenWidth + x,
    y: y,
    collected: false
  };
}

function jump() {
  if (!isJumping) {
    isJumping = true;
    jumpVelocity = -15;
    document.getElementById('jumpHint').style.display = 'none';
  }
}

function updateJump() {
  if (isJumping) {
    jumpVelocity += gravity;
    playerY -= jumpVelocity;
    if (playerY >= groundY) {
      playerY = groundY;
      isJumping = false;
      jumpVelocity = 0;
    }
    const player = document.getElementById('player');
    if (player) {
      player.style.bottom = playerY + 'px';
    }
  }
}

function checkCollisions() {
  const player = document.getElementById('player');
  if (!player) return;
  const playerRect = player.getBoundingClientRect();

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obsRect = obstacles[i].element.getBoundingClientRect();
    if (isColliding(playerRect, obsRect)) {
      handleCollision();
      obstacles[i].element.remove();
      obstacles.splice(i, 1);
    }
  }

  for (let i = coins.length - 1; i >= 0; i--) {
    if (!coins[i].collected) {
      const coinRect = coins[i].element.getBoundingClientRect();
      if (isColliding(playerRect, coinRect)) {
        coins[i].collected = true;
        score += 50;
        coins[i].element.remove();
        coins.splice(i, 1);
      }
    }
  }
}

function isColliding(r1, r2) {
  return !(r1.right < r2.left || r1.left > r2.right ||
           r1.bottom < r2.top || r1.top > r2.bottom);
}

function handleCollision() {
  lives--;
  updateLives();
  if (lives <= 0) {
    gameOver();
  } else {
    const player = document.getElementById('player');
    if (player) {
      player.style.opacity = '0.5';
      setTimeout(function() { player.style.opacity = '1'; }, 400);
    }
  }
}

function updateGame(currentTime) {
  if (gameState !== 'playing') return;
  lastTime = currentTime;
  score++;
  updateScore();
  updateJump();

  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= gameSpeed;
    obstacles[i].element.style.right = (screenWidth - obstacles[i].x) + 'px';
    if (obstacles[i].x < -50) {
      obstacles[i].element.remove();
      obstacles.splice(i, 1);
    }
  }

  for (let i = coins.length - 1; i >= 0; i--) {
    if (!coins[i].collected) {
      coins[i].x -= gameSpeed;
      coins[i].element.style.right = (screenWidth - coins[i].x) + 'px';
      if (coins[i].x < -50) {
        coins[i].element.remove();
        coins.splice(i, 1);
      }
    }
  }

  if (Math.random() < 0.02 && obstacles.length < 3) {
    const height = 30 + Math.random() * 30;
    const x = Math.random() * 200 + 100;
    obstacles.push(createObstacle(x, height));
  }

  if (Math.random() < 0.01 && coins.length < 2) {
    const x = Math.random() * 300 + 150;
    const y = groundY + 40 + Math.random() * 60;
    coins.push(createCoin(x, y));
  }

  if (score % 500 === 0 && score > 0) {
    gameSpeed = Math.min(gameSpeed + 0.5, 12);
  }

  checkCollisions();
  gameLoop = requestAnimationFrame(updateGame);
}

function updateScore() {
  document.getElementById('scoreDisplay').textContent = String(score).padStart(5, '0');
}

function updateLives() {
  const livesDisplay = document.getElementById('livesDisplay');
  livesDisplay.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const heart = document.createElement('span');
    heart.className = 'heart';
    heart.textContent = i < lives ? '❤️' : '🖤';
    livesDisplay.appendChild(heart);
  }
}

function updateHighScore() {
  document.getElementById('bestDisplay').textContent = String(highScore).padStart(5, '0');
  document.getElementById('menuHighScore').textContent = String(highScore).padStart(5, '0');
}

function startGame() {
  gameState = 'playing';
  score = 0;
  lives = 3;
  gameSpeed = 5;
  playerY = groundY;
  isJumping = false;
  jumpVelocity = 0;

  document.getElementById('gameElements').innerHTML = '';
  obstacles = [];
  coins = [];

  document.getElementById('mainMenu').classList.add('hidden');
  document.getElementById('gameOver').classList.add('hidden');
  document.getElementById('jumpHint').style.display = 'block';

  createPlayer();
  updateScore();
  updateLives();
  updateHighScore();

  // Show tap overlay so taps are captured reliably
  document.getElementById('tapOverlay').classList.add('active');

  lastTime = performance.now();
  if (gameLoop) cancelAnimationFrame(gameLoop);
  gameLoop = requestAnimationFrame(updateGame);
}

function gameOver() {
  gameState = 'gameOver';
  if (gameLoop) cancelAnimationFrame(gameLoop);
  document.getElementById('tapOverlay').classList.remove('active');

  if (score > highScore) {
    highScore = score;
    try {
      localStorage.setItem('neonRunnerHighScore', highScore);
    } catch(e) {}
  }

  document.getElementById('finalScore').textContent = String(score).padStart(5, '0');
  document.getElementById('finalBest').textContent = String(highScore).padStart(5, '0');
  document.getElementById('gameOver').classList.remove('hidden');
}

function restartGame() {
  startGame();
}

function showMenu() {
  gameState = 'menu';
  if (gameLoop) cancelAnimationFrame(gameLoop);
  document.getElementById('tapOverlay').classList.remove('active');
  document.getElementById('gameOver').classList.add('hidden');
  document.getElementById('mainMenu').classList.remove('hidden');
  document.getElementById('gameElements').innerHTML = '';
  updateHighScore();
}

window.addEventListener('load', init);

document.addEventListener('touchmove', function(e) {
  if (gameState === 'playing') {
    e.preventDefault();
  }
}, { passive: false });
</script>

</body>
</html>
