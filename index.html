<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Runner - Mobile Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050810;
    color: #e8f4ff;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    touch-action: none;
    position: relative;
    height: 100vh;
    width: 100vw;
  }

  /* Mobile viewport adjustments */
  @media (max-width: 768px) {
    body { font-size: 14px; }
  }

  /* Game container */
  #gameContainer {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(180deg, #060820 0%, #0d1535 60%, #1a1040 100%);
  }

  /* Stars background */
  .stars {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* City skyline */
  .skyline {
    position: absolute;
    bottom: 110px;
    left: 0; right: 0;
    height: 80px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    padding: 0 8px;
    animation: scroll-bg 8s linear infinite;
  }
  .building {
    background: rgba(0,245,255,0.06);
    border: 1px solid rgba(0,245,255,0.12);
    border-bottom: none;
    flex-shrink: 0;
  }
  @keyframes scroll-bg {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* Ground */
  .ground {
    position: absolute;
    bottom: 80px;
    left: 0; right: 0;
    height: 30px;
    background: linear-gradient(180deg, #0d1f3c, #071020);
    border-top: 2px solid #00f5ff;
    box-shadow: 0 -4px 20px rgba(0,245,255,0.3);
    overflow: hidden;
  }
  .ground-line {
    position: absolute;
    top: 50%; left: 0;
    height: 1px;
    width: 40px;
    background: rgba(0,245,255,0.3);
    animation: ground-scroll 0.4s linear infinite;
  }
  @keyframes ground-scroll {
    from { transform: translateX(100vw); }
    to { transform: translateX(-40px); }
  }

  /* Player character */
  .player {
    position: absolute;
    bottom: 110px;
    left: 40px;
    width: 30px;
    height: 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: none;
    z-index: 10;
  }
  .player.jumping {
    animation: none;
  }
  .player-body {
    width: 22px; height: 24px;
    background: linear-gradient(135deg, #00f5ff, #0099cc);
    border-radius: 4px 4px 2px 2px;
    box-shadow: 0 0 10px rgba(0,245,255,0.6);
    position: relative;
  }
  .player-body::before {
    content: '▶';
    position: absolute;
    top: 3px; left: 5px;
    font-size: 10px;
    color: rgba(0,0,0,0.5);
  }
  .player-legs {
    display: flex;
    gap: 4px;
    margin-top: 2px;
  }
  .leg {
    width: 7px; height: 12px;
    background: #00f5ff;
    border-radius: 2px;
    box-shadow: 0 0 6px rgba(0,245,255,0.5);
  }
  .leg:first-child { animation: leg1 0.3s steps(2) infinite; }
  .leg:last-child { animation: leg2 0.3s steps(2) infinite; }
  @keyframes leg1 { 0%,100%{ height:12px; } 50%{ height:6px; margin-top:6px; } }
  @keyframes leg2 { 0%,100%{ height:6px; margin-top:6px; } 50%{ height:12px; } }

  /* Obstacles */
  .obstacle {
    position: absolute;
    bottom: 110px;
    width: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 5;
  }
  .obs-body {
    background: linear-gradient(135deg, #ff3cac, #8800cc);
    border-radius: 3px 3px 0 0;
    box-shadow: 0 0 12px rgba(255,60,172,0.6);
  }

  /* Coins */
  .coin {
    position: absolute;
    width: 12px; height: 12px;
    background: #ffd700;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,215,0,0.7);
    z-index: 5;
  }

  /* Speed lines */
  .speed-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,245,255,0.2), transparent);
    animation: speed 0.6s linear infinite;
  }
  @keyframes speed {
    from { transform: translateX(100vw) scaleX(1); opacity: 1; }
    to { transform: translateX(-200px) scaleX(0.3); opacity: 0; }
  }

  /* HUD */
  .hud {
    position: absolute;
    top: 12px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 14px;
    z-index: 20;
  }
  .hud-score {
    font-family: monospace;
    font-size: 13px;
    color: #00f5ff;
    text-shadow: 0 0 8px rgba(0,245,255,0.6);
  }
  .hud-score span { font-size: 9px; color: #5a6a8a; display: block; }
  .hud-lives { display: flex; gap: 3px; }
  .heart { font-size: 10px; filter: drop-shadow(0 0 4px rgba(255,60,172,0.8)); }
  .hud-best {
    font-family: monospace;
    font-size: 9px;
    color: #ffd700;
    text-align: right;
    text-shadow: 0 0 6px rgba(255,215,0,0.5);
  }
  .hud-best span { font-size: 12px; display: block; }

  /* Game states */
  .game-menu, .game-over {
    position: absolute;
    inset: 0;
    background: rgba(5,8,16,0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 30;
    text-align: center;
  }
  .game-title {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #00f5ff, #ff3cac);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .game-btn {
    background: rgba(0,245,255,0.1);
    border: 2px solid #00f5ff;
    color: #00f5ff;
    padding: 12px 24px;
    font-size: 16px;
    margin: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .game-btn:hover {
    background: rgba(0,245,255,0.2);
    box-shadow: 0 0 20px rgba(0,245,255,0.5);
  }
  .hidden { display: none; }

  /* Jump hint */
  .jump-hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 8px;
    color: #00f5ff;
    letter-spacing: 2px;
    opacity: 0.6;
    animation: pulse-hint 1.5s ease-in-out infinite;
    z-index: 15;
  }
  @keyframes pulse-hint { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

  /* Mobile optimizations */
  @media (max-width: 480px) {
    .player { left: 20px; }
    .hud { padding: 0 10px; }
    .hud-score, .hud-best { font-size: 11px; }
    .jump-hint { font-size: 7px; }
  }
</style>
</head>
<body>

<div id="gameContainer">
  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Speed lines -->
  <div class="speed-line" style="top:40px;width:80px;animation-delay:0s"></div>
  <div class="speed-line" style="top:60px;width:50px;animation-delay:0.2s"></div>
  <div class="speed-line" style="top:75px;width:100px;animation-delay:0.5s"></div>
  <div class="speed-line" style="top:90px;width:60px;animation-delay:0.8s"></div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-score">
      <span>SCORE</span>
      <span id="scoreDisplay">00000</span>
    </div>
    <div class="hud-lives" id="livesDisplay">
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
    </div>
    <div class="hud-best">
      <span>BEST</span>
      <span id="bestDisplay">00000</span>
    </div>
  </div>

  <!-- Skyline -->
  <div class="skyline" id="skyline"></div>

  <!-- Ground -->
  <div class="ground">
    <div class="ground-line" style="animation-delay:0s"></div>
    <div class="ground-line" style="animation-delay:0.13s"></div>
    <div class="ground-line" style="animation-delay:0.26s"></div>
    <div class="ground-line" style="animation-delay:0.39s"></div>
  </div>

  <!-- Game elements (will be created dynamically) -->
  <div id="gameElements"></div>

  <!-- Jump hint -->
  <div class="jump-hint" id="jumpHint">▲ TAP TO JUMP ▲</div>

  <!-- Main Menu -->
  <div class="game-menu" id="mainMenu">
    <div class="game-title">NEON RUNNER</div>
    <button class="game-btn" onclick="startGame()">PLAY</button>
    <div style="margin-top: 20px; color: #5a6a8a; font-size: 12px;">
      High Score: <span id="menuHighScore">00000</span>
    </div>
  </div>

  <!-- Game Over -->
  <div class="game-over hidden" id="gameOver">
    <div class="game-title">GAME OVER</div>
    <div style="margin: 20px 0;">
      <div style="font-size: 18px; margin-bottom: 10px;">Score: <span id="finalScore">00000</span></div>
      <div style="font-size: 14px; color: #ffd700;">Best: <span id="finalBest">00000</span></div>
    </div>
    <button class="game-btn" onclick="restartGame()">RETRY</button>
    <button class="game-btn" onclick="showMenu()">MENU</button>
  </div>
</div>

<script>
// Game variables
let gameState = 'menu'; // menu, playing, gameOver
let score = 0;
let lives = 3;
let highScore = localStorage.getItem('neonRunnerHighScore') || 0;
let gameSpeed = 5;
let isJumping = false;
let jumpVelocity = 0;
let gravity = 0.8;
let groundY = 110;
let playerY = groundY;
let obstacles = [];
let coins = [];
let gameLoop = null;
let lastTime = 0;

// Screen dimensions
let screenWidth = window.innerWidth;
let screenHeight = window.innerHeight;

// Initialize game
function init() {
  generateStars();
  generateSkyline();
  updateHighScore();
  
  // Add touch/click listeners — multiple events for WebViewer compatibility
  document.addEventListener('touchstart', handleTouch, { passive: false });
  document.addEventListener('mousedown', handleTouch);
  document.addEventListener('click', handleTouch);
  
  // Handle resize
  window.addEventListener('resize', () => {
    screenWidth = window.innerWidth;
    screenHeight = window.innerHeight;
  });
}

// Generate stars
function generateStars() {
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.classList.add('star');
    const size = Math.random() * 2 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random() * 55}%;
      left:${Math.random() * 100}%;
      animation-delay:${Math.random() * 3}s;
      animation-duration:${1.5 + Math.random() * 2}s;
    `;
    starsEl.appendChild(s);
  }
}

// Generate skyline buildings (doubled for loop)
function generateSkyline() {
  const skyline = document.getElementById('skyline');
  const bldgs = [20,35,15,45,28,18,40,25,32,16,42,22,38,14,30];
  [...bldgs,...bldgs].forEach(h => {
    const b = document.createElement('div');
    b.classList.add('building');
    const w = 10 + Math.random() * 14;
    b.style.cssText = `width:${w}px;height:${h}px;`;
    skyline.appendChild(b);
  });
}

// Create player
function createPlayer() {
  const player = document.createElement('div');
  player.className = 'player';
  player.id = 'player';
  player.innerHTML = `
    <div class="player-body"></div>
    <div class="player-legs">
      <div class="leg"></div>
      <div class="leg"></div>
    </div>
  `;
  player.style.bottom = playerY + 'px';
  document.getElementById('gameElements').appendChild(player);
  return player;
}

// Create obstacle
function createObstacle(x, height, delay = 0) {
  const obstacle = document.createElement('div');
  obstacle.className = 'obstacle';
  obstacle.style.right = x + 'px';
  obstacle.innerHTML = `<div class="obs-body" style="width:22px;height:${height}px"></div>`;
  document.getElementById('gameElements').appendChild(obstacle);
  
  return {
    element: obstacle,
    x: screenWidth + x,
    height: height,
    speed: gameSpeed
  };
}

// Create coin
function createCoin(x, y) {
  const coin = document.createElement('div');
  coin.className = 'coin';
  coin.style.right = x + 'px';
  coin.style.bottom = y + 'px';
  document.getElementById('gameElements').appendChild(coin);
  
  return {
    element: coin,
    x: screenWidth + x,
    y: y,
    collected: false
  };
}

// Handle touch/click
function handleTouch(e) {
  // Only prevent default during gameplay, not on buttons
  if (e.target.tagName !== 'BUTTON' && gameState === 'playing') {
    e.preventDefault();
  }
  if (gameState === 'playing' && !isJumping) {
    jump();
  }
}

// Jump mechanic
function jump() {
  if (!isJumping) {
    isJumping = true;
    jumpVelocity = -15;
    const player = document.getElementById('player');
    player.classList.add('jumping');
    
    // Hide jump hint after first jump
    document.getElementById('jumpHint').style.display = 'none';
  }
}

// Update jump physics
function updateJump() {
  if (isJumping) {
    jumpVelocity += gravity;
    playerY -= jumpVelocity;
    
    if (playerY >= groundY) {
      playerY = groundY;
      isJumping = false;
      jumpVelocity = 0;
      const player = document.getElementById('player');
      player.classList.remove('jumping');
    }
    
    const player = document.getElementById('player');
    if (player) {
      player.style.bottom = playerY + 'px';
    }
  }
}

// Check collisions
function checkCollisions() {
  const player = document.getElementById('player');
  if (!player) return;
  
  const playerRect = player.getBoundingClientRect();
  
  // Check obstacle collisions
  obstacles.forEach((obstacle, index) => {
    const obsRect = obstacle.element.getBoundingClientRect();
    if (isColliding(playerRect, obsRect)) {
      handleCollision();
      obstacles.splice(index, 1);
      obstacle.element.remove();
    }
  });
  
  // Check coin collisions
  coins.forEach((coin, index) => {
    if (!coin.collected) {
      const coinRect = coin.element.getBoundingClientRect();
      if (isColliding(playerRect, coinRect)) {
        coin.collected = true;
        score += 50;
        coin.element.remove();
        coins.splice(index, 1);
      }
    }
  });
}

// Simple collision detection
function isColliding(rect1, rect2) {
  return !(rect1.right < rect2.left || 
           rect1.left > rect2.right || 
           rect1.bottom < rect2.top || 
           rect1.top > rect2.bottom);
}

// Handle collision
function handleCollision() {
  lives--;
  updateLives();
  
  if (lives <= 0) {
    gameOver();
  } else {
    // Flash effect
    const player = document.getElementById('player');
    player.style.opacity = '0.5';
    setTimeout(() => {
      player.style.opacity = '1';
    }, 200);
  }
}

// Update game elements
function updateGame(currentTime) {
  if (gameState !== 'playing') return;
  
  const deltaTime = currentTime - lastTime;
  lastTime = currentTime;
  
  // Update score
  score++;
  updateScore();
  
  // Update jump physics
  updateJump();
  
  // Move obstacles
  obstacles.forEach((obstacle, index) => {
    obstacle.x -= gameSpeed;
    obstacle.element.style.right = (screenWidth - obstacle.x) + 'px';
    
    // Remove off-screen obstacles
    if (obstacle.x < -50) {
      obstacle.element.remove();
      obstacles.splice(index, 1);
    }
  });
  
  // Move coins
  coins.forEach((coin, index) => {
    if (!coin.collected) {
      coin.x -= gameSpeed;
      coin.element.style.right = (screenWidth - coin.x) + 'px';
      
      // Remove off-screen coins
      if (coin.x < -50) {
        coin.element.remove();
        coins.splice(index, 1);
      }
    }
  });
  
  // Spawn new obstacles
  if (Math.random() < 0.02 && obstacles.length < 3) {
    const height = 30 + Math.random() * 30;
    const x = Math.random() * 200 + 100;
    obstacles.push(createObstacle(x, height));
  }
  
  // Spawn new coins
  if (Math.random() < 0.01 && coins.length < 2) {
    const x = Math.random() * 300 + 150;
    const y = groundY + 40 + Math.random() * 60;
    coins.push(createCoin(x, y));
  }
  
  // Increase difficulty
  if (score % 500 === 0) {
    gameSpeed = Math.min(gameSpeed + 0.5, 12);
  }
  
  // Check collisions
  checkCollisions();
  
  // Continue game loop
  gameLoop = requestAnimationFrame(updateGame);
}

// Update UI
function updateScore() {
  document.getElementById('scoreDisplay').textContent = String(score).padStart(5, '0');
}

function updateLives() {
  const livesDisplay = document.getElementById('livesDisplay');
  livesDisplay.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const heart = document.createElement('span');
    heart.className = 'heart';
    heart.textContent = i < lives ? '❤️' : '🖤';
    livesDisplay.appendChild(heart);
  }
}

function updateHighScore() {
  document.getElementById('bestDisplay').textContent = String(highScore).padStart(5, '0');
  document.getElementById('menuHighScore').textContent = String(highScore).padStart(5, '0');
}

// Game control functions
function startGame() {
  gameState = 'playing';
  score = 0;
  lives = 3;
  gameSpeed = 5;
  playerY = groundY;
  isJumping = false;
  jumpVelocity = 0;
  
  // Clear existing elements
  document.getElementById('gameElements').innerHTML = '';
  obstacles = [];
  coins = [];
  
  // Hide menus
  document.getElementById('mainMenu').classList.add('hidden');
  document.getElementById('gameOver').classList.add('hidden');
  document.getElementById('jumpHint').style.display = 'block';
  
  // Create player
  createPlayer();
  
  // Update UI
  updateScore();
  updateLives();
  updateHighScore();
  
  // Start game loop
  lastTime = performance.now();
  gameLoop = requestAnimationFrame(updateGame);
}

function gameOver() {
  gameState = 'gameOver';
  
  // Cancel game loop
  if (gameLoop) {
    cancelAnimationFrame(gameLoop);
  }
  
  // Update high score
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('neonRunnerHighScore', highScore);
  }
  
  // Show game over screen
  document.getElementById('finalScore').textContent = String(score).padStart(5, '0');
  document.getElementById('finalBest').textContent = String(highScore).padStart(5, '0');
  document.getElementById('gameOver').classList.remove('hidden');
}

function restartGame() {
  startGame();
}

function showMenu() {
  gameState = 'menu';
  document.getElementById('gameOver').classList.add('hidden');
  document.getElementById('mainMenu').classList.remove('hidden');
  document.getElementById('gameElements').innerHTML = '';
  updateHighScore();
}

// Initialize on load
window.addEventListener('load', init);

// Prevent scrolling on mobile
document.addEventListener('touchmove', (e) => {
  if (gameState === 'playing') {
    e.preventDefault();
  }
}, { passive: false });
</script>

</body>
</html>
